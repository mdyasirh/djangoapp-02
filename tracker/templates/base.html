{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitLife Studio – Time Tracking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    .card { background-color: #16213e; border: 1px solid #0f3460; }
    .table { color: #e0e0e0; }
    .table-dark { --bs-table-bg: #16213e; --bs-table-border-color: #0f3460; }
    .navbar { background-color: #0f3460 !important; }
    .btn-lang { font-size: 0.85rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .badge-pulse { animation: pulse 1.5s infinite; }
    .keypad-btn { width: 60px; height: 60px; font-size: 1.4rem; margin: 4px; }
  </style>
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">🏋️ FitLife Studio</a>
      <div class="d-flex align-items-center gap-3">
        <button id="langToggle" class="btn btn-outline-light btn-sm btn-lang" onclick="toggleLanguage()">EN | DE</button>
        {% if user.is_authenticated %}
          <span class="text-light small" data-en="Hello, {{ user.get_full_name|default:user.username }}" data-de="Hallo, {{ user.get_full_name|default:user.username }}">Hello, {{ user.get_full_name|default:user.username }}</span>
          <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm" data-en="Logout" data-de="Abmelden">Logout</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
